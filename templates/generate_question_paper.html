<!DOCTYPE html>

<html>
<head>
    <title>Generate Question Paper</title>
</head>
<body>

<h2>Generate Question Paper</h2>

<form method="POST">

```
<label>Subject</label>

<select name="subject_id" required>

    {% for s in subjects %}
    <option value="{{ s.subject_id }}">
        {{ s.subject_name }}
    </option>
    {% endfor %}

</select>

<button type="submit">
    Generate
</button>
```

</form>

<hr>

{% if generated_questions %}

<h3>Generated Question Paper</h3>

<p>
Total Marks : {{ total_marks }}
</p>

{% for q in generated_questions %}

<p>
<b>Q{{ loop.index }}.</b>

{{ q.question_text }}

({{ q.marks }} Marks)

</p>

{% endfor %}

{% endif %}

</body>
</html>
