<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QPG System</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1d4ed8, #0ea5e9);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            width: 420px;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 18px;
            padding: 32px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
        }

        .login-container h2 {
            margin: 0 0 8px 0;
            text-align: center;
            color: #0f172a;
            font-size: 30px;
        }

        .login-container p {
            text-align: center;
            color: #64748b;
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #1e293b;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        button {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #2563eb, #4f46e5);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.95;
        }

        .error-box {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 14px;
        }

        .info-box {
            margin-top: 18px;
            background: #eff6ff;
            color: #1d4ed8;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.6;
        }

        .signup-link {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
        }

        .signup-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Login</h2>
        <p>Enter your User ID and Password</p>

        {% if error %}
            <div class="error-box">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <label>User ID</label>
            <input type="number" name="user_id" placeholder="Enter your User ID" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>

            <button type="submit">Login</button>
        </form>
        <p style="margin-top:10px;">
    <a href="{{ url_for('forgot_password') }}">
        Forgot User ID / Password?
    </a>
</p>

        <div class="info-box">
            Use the User ID generated at signup time.
        </div>

        <div class="signup-link">
            Don’t have an account? <a href="{{ url_for('signup') }}">Sign Up</a>
        </div>
    </div>

</body>
</html>
