<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
</head>
<body>

    <h2>Forgot User ID / Password</h2>

    {% if message %}
        <p>{{ message }}</p>
    {% endif %}

    <form method="POST">

        <label>Email:</label><br>
        <input type="email" name="email" required><br><br>

        <label>New Password:</label><br>
        <input type="password" name="new_password" required><br><br>

        <button type="submit">
            Reset Password
        </button>

    </form>

</body>
</html>
