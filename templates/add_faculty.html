<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Faculty</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="form-body">

    <div class="form-wrapper">
        <div class="form-card">
            <h2>Add New Faculty</h2>
            <p class="form-subtitle">Create faculty for your department</p>

            {% if message %}
                <div class="message success-message">{{ message }}</div>
            {% endif %}

            <form method="POST">
                <label>Name</label>
                <input type="text" name="name" required>

                <label>Email</label>
                <input type="email" name="email" required>

                <label>Password</label>
                <input type="password" name="password" required>

                <label>Department</label>
                <input type="text" value="{{ hod_department }}" readonly>

                <button type="submit" class="btn btn-primary full-width">Create Faculty</button>
            </form>

            <div style="margin-top:10px;">
                <a href="{{ url_for('hod_dashboard') }}" class="btn btn-primary full-width" style="text-align:center; display:block;">
                    Back to HOD Dashboard
                </a>
            </div>
        </div>
    </div>

</body>
</html>
