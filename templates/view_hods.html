<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View HOD List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dashboard-body">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-box small-logo">QPG</div>
            <div>
                <h3>Admin Panel</h3>
                <p>System Control</p>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
            <a href="{{ url_for('add_hod') }}">Add HOD</a>
            <a href="{{ url_for('view_hods') }}" class="active-link">View HOD List</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </nav>
    </aside>

    <main class="dashboard-main">
        <div class="dashboard-top">
            <div>
                <h1>HOD List</h1>
                <p>All created HOD accounts</p>
            </div>
        </div>

        <section class="panel-card full-panel">
            <table class="activity-table">
                <tr>
                    <th>User ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Department</th>
                    <th>Address</th>
                </tr>

                {% for hod in hods %}
                <tr>
                    <td>{{ hod.user_id }}</td>
                    <td>{{ hod.name }}</td>
                    <td>{{ hod.email }}</td>
                    <td>{{ hod.department }}</td>
                    <td>{{ hod.address }}</td>
                </tr>
                {% endfor %}
            </table>
        </section>
    </main>

</body>
</html>
